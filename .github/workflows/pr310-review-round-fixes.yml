name: Validate PR 310 review-round fixes

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: pr310-review-round-fixes-v2
  cancel-in-progress: true

jobs:
  patch-test-commit:
    if: github.event.pull_request.number == 310 && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/stars-payment-safety
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Correct review-round matcher
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/pr310-review-round-fixes.py')
          text = path.read_text()
          text = text.replace(
              '    """          expires_at = MAX(',
              '    """      SET expires_at = MAX(',
              1,
          )
          text = text.replace(
              '    """          expires_at = COALESCE(',
              '    """      SET expires_at = COALESCE(',
              1,
          )
          path.write_text(text)
          PY

      - name: Apply review-round fixes
        run: python3 scripts/pr310-review-round-fixes.py

      - name: Prepare runtime data directory
        run: |
          sudo mkdir -p /data
          sudo chmod 777 /data

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build TypeScript
        run: npm run build

      - name: Run full Jest suite
        run: timeout 360s npm test -- --runInBand --forceExit

      - name: Commit validated fixes
        shell: bash
        run: |
          rm -f .github/workflows/pr310-review-round-fixes.yml
          rm -f scripts/pr310-review-round-fixes.py
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "199175422+chatgpt-codex-connector[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(stars): reconcile monitoring and finalize refunds"
          git push origin HEAD:hotfix/stars-payment-safety
