name: Validate PR 310 review-round fixes

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: pr310-review-round-fixes-v3
  cancel-in-progress: true

jobs:
  patch-test-commit:
    if: github.event.pull_request.number == 310 && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/stars-payment-safety
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply review-round fixes
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/pr310-review-round-fixes.py 2>&1 | tee patch.log

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr310-patch-log-${{ github.run_id }}
          path: patch.log
          if-no-files-found: warn

      - name: Prepare runtime data directory
        run: |
          sudo mkdir -p /data
          sudo chmod 777 /data

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build TypeScript
        run: npm run build

      - name: Run full Jest suite
        run: timeout 360s npm test -- --runInBand --forceExit

      - name: Commit validated fixes
        shell: bash
        run: |
          rm -f .github/workflows/pr310-review-round-fixes.yml
          rm -f scripts/pr310-review-round-fixes.py
          rm -f patch.log
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "199175422+chatgpt-codex-connector[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(stars): reconcile monitoring and finalize refunds"
          git push origin HEAD:hotfix/stars-payment-safety
