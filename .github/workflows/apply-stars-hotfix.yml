name: Apply Stars hotfix

on:
  push:
    branches:
      - hotfix/stars-payment-safety

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[stars-hotfix-applied]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply deterministic patch
        run: python3 scripts/apply-stars-hotfix.py

      - name: Prepare persistent data path
        run: |
          sudo mkdir -p /data
          sudo chown -R "$USER:$USER" /data

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --runInBand --forceExit

      - name: Commit validated hotfix
        run: |
          git config user.name "stars-hotfix-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No patch changes to commit"
            exit 0
          fi
          git commit -m "fix(stars): harden payments and add monitoring [stars-hotfix-applied]"
          git push origin HEAD:hotfix/stars-payment-safety
