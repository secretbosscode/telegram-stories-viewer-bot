name: Validate pull request

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/stars-result-unlocks

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      PROD_BOT_TOKEN: test-token
      DEV_BOT_TOKEN: test-token
      USERBOT_API_ID: 1
      USERBOT_API_HASH: test-hash
      USERBOT_PHONE_NUMBER: "+15555550100"
      USERBOT_PASSWORD: ""
      USERBOT_PHONE_CODE: ""
      BOT_ADMIN_ID: 999
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/stars-payment-safety
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply final support-order fix
        if: github.event.pull_request.number == 310 && github.actor != 'github-actions[bot]'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          payment = Path('src/services/stars-payment.ts')
          text = payment.read_text()
          old = """     WHERE p.user_id = ?
     ORDER BY p.paid_at DESC
     LIMIT 1`,"""
          new = """     WHERE p.user_id = ?
     ORDER BY p.paid_at DESC, p.rowid DESC
     LIMIT 1`,"""
          if old in text:
              payment.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit('latest payment ordering query not found')

          test_file = Path('__tests__/stars-payment.test.ts')
          tests = test_file.read_text()
          test_name = "paysupport selects the newest same-second payment by insertion order"
          if test_name not in tests:
              marker = "  test('legacy BTC mode leaves the existing delivery path untouched', async () => {"
              test = r'''
  test('paysupport selects the newest same-second payment by insertion order', async () => {
    const now = Math.floor(Date.now() / 1000);
    const enqueueDownloadFx = (require('../src/db/effects') as any).enqueueDownloadFx as jest.Mock;
    enqueueDownloadFx.mockClear();

    const insertBundle = db.prepare(`
      INSERT INTO star_result_bundles (
        id, user_id, chat_id, target, locale, request_kind, story_ids,
        task_json, result_count, price_stars, status, created_at, expires_at,
        paid_at, delivered_at, attempt_count
      ) VALUES (?, '123', '123', '@target', 'en', 'current', '[101]', ?, 1, 25,
        ?, ?, ?, ?, ?, 0)
    `);
    insertBundle.run(
      'support-older',
      JSON.stringify({ chatId: '123', link: '@older', linkType: 'username', locale: 'en', initTime: 0 }),
      'DELIVERED',
      now,
      now + 1800,
      now,
      now,
    );
    insertBundle.run(
      'support-newer',
      JSON.stringify({ chatId: '123', link: '@newer', linkType: 'username', locale: 'en', initTime: 0 }),
      'PAID',
      now,
      now + 1800,
      now,
      null,
    );
    db.prepare(`
      INSERT INTO star_payments (
        telegram_payment_charge_id, bundle_id, user_id, amount_stars, paid_at
      ) VALUES (?, ?, '123', 25, ?)
    `).run('support-charge-older', 'support-older', now);
    db.prepare(`
      INSERT INTO star_payments (
        telegram_payment_charge_id, bundle_id, user_id, amount_stars, paid_at
      ) VALUES (?, ?, '123', 25, ?)
    `).run('support-charge-newer', 'support-newer', now);

    const supportHandler = (bot.command as jest.Mock).mock.calls.find(
      ([command]) => command === 'paysupport',
    )?.[1] as ((ctx: any) => Promise<void>) | undefined;
    expect(supportHandler).toBeDefined();
    const reply = jest.fn(async () => undefined);
    await supportHandler!({ from: { id: 123, language_code: 'en' }, reply });

    expect(enqueueDownloadFx).toHaveBeenCalled();
    expect(reply).toHaveBeenCalledWith(expect.stringContaining('pending'));
  });

'''
              if tests.count(marker) != 1:
                  raise SystemExit(f'test insertion marker count: {tests.count(marker)}')
              test_file.write_text(tests.replace(marker, test + marker, 1))
          PY

      - name: Prepare runtime data directory
        run: |
          sudo mkdir -p /data
          sudo chown -R "$USER:$USER" /data
          rm -f /data/database.db /data/database.db-shm /data/database.db-wal

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --silent >/dev/null 2>&1

      - name: Build TypeScript
        run: |
          set +e
          npm run build --silent > build.log 2>&1
          status=$?
          tail -n 120 build.log
          exit $status

      - name: Run Jest suite
        run: |
          set +e
          timeout 180s npm test -- --runInBand --silent --forceExit > jest.log 2>&1
          status=$?
          tail -n 260 jest.log
          exit $status

      - name: Commit validated final fix
        if: github.event.pull_request.number == 310 && github.actor != 'github-actions[bot]'
        run: |
          git checkout origin/main -- .github/workflows/pr-validation.yml
          rm -f .github/workflows/pr310-support-order-fix.yml
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "199175422+chatgpt-codex-connector[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No validated changes to commit"
          else
            git commit -m "fix(stars): order same-second support payments deterministically"
            git push origin HEAD:hotfix/stars-payment-safety
          fi

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: |
            build.log
            jest.log
          if-no-files-found: ignore
          retention-days: 3
