  ).all() as { telegram_id: string; language?: string }[];""",
          )

          # Regression tests: active paid pagination and partial delivery.
          replace_once(
              '__tests__/send-active-stories.test.ts',
              "import { sendActiveStories } from '../src/controllers/send-active-stories';\n",
              "import { sendActiveStories } from '../src/controllers/send-active-stories';\nimport { PartialStoryDeliveryError } from '../src/controllers/send-paginated-stories';\n",
          )
          replace_once(
              '__tests__/send-active-stories.test.ts',
              '    jest.clearAllMocks();\n    downloadStories.mockResolvedValue',
              "    jest.clearAllMocks();\n    (bot.telegram.sendMediaGroup as jest.Mock).mockReset().mockResolvedValue([]);\n    downloadStories.mockResolvedValue",
