name: Apply PR 310 review fixes

on:
  push:
    branches:
      - hotfix/stars-payment-safety

permissions:
  contents: write

concurrency:
  group: pr310-review-fixes
  cancel-in-progress: true

jobs:
  patch-test-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/stars-payment-safety
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply remaining review fixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          def load(path):
              return Path(path).read_text()

          def save(path, text):
              Path(path).write_text(text)

          def one(path, old, new):
              text = load(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{path}: expected 1 match, got {count}: {old[:100]!r}')
              save(path, text.replace(old, new, 1))

          def all_matches(path, old, new, expected):
              text = load(path)
              count = text.count(old)
              if count != expected:
                  raise RuntimeError(f'{path}: expected {expected} matches, got {count}: {old[:100]!r}')
              save(path, text.replace(old, new))

          def regex_one(path, pattern, replacement):
              text = load(path)
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f'{path}: regex expected 1 match, got {count}: {pattern[:100]!r}')
              save(path, updated)

          def append_test(path, block):
              text = load(path)
              marker = '\n});'
              index = text.rfind(marker)
              if index < 0:
                  raise RuntimeError(f'{path}: describe terminator not found')
              save(path, text[:index] + block + text[index:])

          # Existing paid Stars obligations must recover regardless of the mode used
          # for new checkouts.
          one(
              'src/services/stars-payment.ts',
              'async function recoverPaidBundles(): Promise<void> {\n  if (recoveryRunning || !botInstance || !isStarsMode()) return;',
              'export async function recoverPaidBundles(): Promise<void> {\n  if (recoveryRunning || !botInstance) return;',
          )

          # Pinned stories return exact delivered IDs and paid jobs bypass old
          # Premium pagination/free limits.
          one(
              'src/controllers/send-pinned-stories.ts',
              "import { sendStoryFallbacks } from 'controllers/story-fallback';\n",
              "import { sendStoryFallbacks } from 'controllers/story-fallback';\nimport { PartialStoryDeliveryError } from 'controllers/send-paginated-stories';\n",
          )
          one(
              'src/controllers/send-pinned-stories.ts',
              'export async function sendPinnedStories({ stories, task }: SendStoriesArgs): Promise<void> {\n  try {',
              'export async function sendPinnedStories({ stories, task }: SendStoriesArgs): Promise<number[]> {\n  const deliveredStoryIds = new Set<number>();\n  try {',
          )
          one(
              'src/controllers/send-pinned-stories.ts',
              '    const isPrivileged = task.isPremium || isAdmin;',
              '    const isPrivileged = task.isPremium || isAdmin || Boolean(task.starsUnlocked);',
          )
          one(
              'src/controllers/send-pinned-stories.ts',
              '    if ((task.isPremium || isAdmin) && mapped.length > PER_PAGE) {',
              '    if (isPrivileged && !task.starsUnlocked && mapped.length > PER_PAGE) {',
          )
          one(
              'src/controllers/send-pinned-stories.ts',
              '    const failedDownloads = downloadResult.failed.filter((story) => !story.buffer);',
              "    const fallbackCandidates = mapped.filter(\n      (story) => !story.buffer || Number(story.bufferSize ?? 0) > 50,\n    );",
          )
          regex_one(
              'src/controllers/send-pinned-stories.ts',
              r"      const chunkedList = chunkMediafiles\(uploadableStories\);\n      for \(let i = 0; i < chunkedList\.length; i\+\+\) \{[\s\S]*?        await timeout\(500\);\n      \}",
              """      const chunkedList = chunkMediafiles(uploadableStories);
      for (let i = 0; i < chunkedList.length; i++) {
        const album = chunkedList[i];
        try {
          if (album.length === 1) {
            const single = album[0];
            const media = { source: single.buffer! };
            const extra = {
              caption: buildPinnedCaption(single.caption, `Pinned story from ${task.link}`),
            };
            if (single.mediaType === 'photo') {
              await bot.telegram.sendPhoto(task.chatId, media, extra);
            } else {
              await bot.telegram.sendVideo(task.chatId, media, extra);
            }
          } else {
            await bot.telegram.sendMediaGroup(
              task.chatId,
              album.map((story: MappedStoryItem) => ({
                media: { source: story.buffer! },
                type: story.mediaType!,
                caption: buildPinnedCaption(story.caption, `Pinned story from ${task.link}`),
              })),
            );
          }
          album.forEach((story: MappedStoryItem) => deliveredStoryIds.add(story.id));
        } catch (sendError) {
          console.error(
            `[SendPinnedStories] [${task.link}] Error sending media chunk ${i + 1}:`,
            sendError,
          );
          throw sendError;
        }
        await timeout(500);
      }""",
          )
          one(
              'src/controllers/send-pinned-stories.ts',
              "    if (failedDownloads.length > 0) {\n      await sendStoryFallbacks(task, failedDownloads);\n    }",
              "    if (fallbackCandidates.length > 0) {\n      const fallbackIds = await sendStoryFallbacks(task, fallbackCandidates);\n      fallbackIds.forEach((storyId) => deliveredStoryIds.add(storyId));\n    }",
          )
          one(
              'src/controllers/send-pinned-stories.ts',
              '      baseInfo: `📥 ${uploadableStories.length} Pinned stories uploaded for user ${task.link} (chatId: ${task.chatId})!`,',
              '      baseInfo: `📥 ${deliveredStoryIds.size} Pinned stories delivered for user ${task.link} (chatId: ${task.chatId})!`,',
          )
          one(
              'src/controllers/send-pinned-stories.ts',
              '    console.log(`[SendPinnedStories] [${task.link}] Processing finished successfully.`);\n\n  } catch (error: any) {',
              '    console.log(`[SendPinnedStories] [${task.link}] Processing finished successfully.`);\n    return [...deliveredStoryIds];\n\n  } catch (error: any) {',
          )
          one(
              'src/controllers/send-pinned-stories.ts',
              '    } catch (e) { /* ignore */}\n    throw error;',
              "    } catch (e) { /* ignore */}\n    if (deliveredStoryIds.size > 0 && !(error instanceof PartialStoryDeliveryError)) {\n      throw new PartialStoryDeliveryError(error, [...deliveredStoryIds]);\n    }\n    throw error;",
          )

          one(
              'src/controllers/send-stories.ts',
              '          const mappedPinnedStories: MappedStoryItem[] = mapStories(pinnedStories);\n          await sendPinnedStories({ stories: mappedPinnedStories, task });\n          storiesWereSent = true;',
              '          const mappedPinnedStories: MappedStoryItem[] = mapStories(pinnedStories);\n          const pinnedDeliveredIds = await sendPinnedStories({\n            stories: mappedPinnedStories,\n            task,\n          });\n          deliveredStoryIds.push(...pinnedDeliveredIds);\n          storiesWereSent = storiesWereSent || pinnedDeliveredIds.length > 0;',
          )

          # Use the existing stoppable monitor scheduler for Premium, admin, and
          # paid Stars entitlements. Partial delivery IDs are persisted while the
          # undelivered remainder stays eligible for the next cycle.
          one(
              'src/services/monitor-service.ts',
              "import { sendActiveStories } from 'controllers/send-active-stories';\n",
              "import { sendActiveStories } from 'controllers/send-active-stories';\nimport { PartialStoryDeliveryError } from 'controllers/send-paginated-stories';\n",
          )
          one(
              'src/services/monitor-service.ts',
              '      if (!premium && Number(monitor.telegram_id) !== BOT_ADMIN_ID) {\n        removeMonitor(monitor.telegram_id, monitor.target_id);\n        continue;\n      }',
              "      const starsEntitlement = getStarsMonitoringEntitlement(monitor.telegram_id);\n      if (!premium && Number(monitor.telegram_id) !== BOT_ADMIN_ID && !starsEntitlement) {\n        removeMonitor(monitor.telegram_id, monitor.target_id);\n        continue;\n      }",
          )
          one(
              'src/services/monitor-service.ts',
              "function recordDeliveredStories(\n  monitorId: number,\n  stories: any[],\n  deliveredIds: Set<number>,\n  type: 'active' | 'pinned',\n): void {",
              """async function deliverMonitorStories(args: any): Promise<Set<number>> {
  try {
    return new Set(await sendActiveStories(args));
  } catch (error) {
    if (error instanceof PartialStoryDeliveryError) {
      console.warn(
        `[Monitor] Partial Telegram delivery confirmed ${error.deliveredStoryIds.length} story IDs; remaining stories will retry.`,
      );
      return new Set(error.deliveredStoryIds);
    }
    throw error;
  }
}

function recordDeliveredStories(
  monitorId: number,
  stories: any[],
  deliveredIds: Set<number>,
  type: 'active' | 'pinned',
): void {""",
          )
          regex_one(
              'src/services/monitor-service.ts',
              r"      const deliveredActiveIds = new Set\(\n        await sendActiveStories\(\{([\s\S]*?)\n        \}\),\n      \);",
              r"      const deliveredActiveIds = await deliverMonitorStories({\1\n        });",
          )
          regex_one(
              'src/services/monitor-service.ts',
              r"      const deliveredPinnedIds = new Set\(\n        await sendActiveStories\(\{([\s\S]*?)\n        \}\),\n      \);",
              r"      const deliveredPinnedIds = await deliverMonitorStories({\1\n        });",
          )
          all_matches(
              'src/services/monitor-service.ts',
              '            initTime: Date.now(),\n',
              '            initTime: Date.now(),\n            monitorDelivery: true,\n',
              2,
          )

          # Eliminate the independent Stars timer so /stopmonitor stops every
