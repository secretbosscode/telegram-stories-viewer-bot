              "      UPDATE star_monitor_grants\n      SET refunded_at = NEW.refunded_at\n      WHERE bundle_id = NEW.bundle_id AND refunded_at IS NULL;\n\n      DELETE FROM star_monitor_entitlements",
              """      UPDATE star_monitor_grants
      SET refunded_at = NEW.refunded_at
      WHERE bundle_id = NEW.bundle_id AND refunded_at IS NULL;

      INSERT OR REPLACE INTO star_monitor_delete_authorizations (
        telegram_id, target_id, authorized_at
      )
      SELECT m.telegram_id, m.target_id, CAST(strftime('%s','now') AS INTEGER)
      FROM monitors m
      JOIN star_monitor_entitlements e ON e.user_id = m.telegram_id
      WHERE e.user_id = (
        SELECT user_id FROM star_monitor_grants WHERE bundle_id = NEW.bundle_id
      )
      AND (
        SELECT COUNT(*) FROM monitors earlier
        WHERE earlier.telegram_id = m.telegram_id
          AND (
            COALESCE(earlier.created_at, 0) < COALESCE(m.created_at, 0)
            OR (
              COALESCE(earlier.created_at, 0) = COALESCE(m.created_at, 0)
              AND earlier.id <= m.id
            )
          )
      ) > e.max_targets;

      DELETE FROM monitors
      WHERE telegram_id = (
        SELECT user_id FROM star_monitor_grants WHERE bundle_id = NEW.bundle_id
      )
      AND (
        SELECT COUNT(*) FROM monitors earlier
        WHERE earlier.telegram_id = monitors.telegram_id
          AND (
            COALESCE(earlier.created_at, 0) < COALESCE(monitors.created_at, 0)
            OR (
              COALESCE(earlier.created_at, 0) = COALESCE(monitors.created_at, 0)
              AND earlier.id <= monitors.id
            )
          )
      ) > COALESCE(
        (SELECT max_targets FROM star_monitor_entitlements e WHERE e.user_id = monitors.telegram_id),
        0
      );

      DELETE FROM star_monitor_delete_authorizations
      WHERE telegram_id = (
        SELECT user_id FROM star_monitor_grants WHERE bundle_id = NEW.bundle_id
      );

      DELETE FROM star_monitor_entitlements""",
          )
          one(
              'src/services/stars-mode-safety.ts',
              "      AND NOT EXISTS (\n        SELECT 1\n        FROM star_monitor_grants g\n        WHERE g.user_id = star_monitor_entitlements.user_id\n          AND g.refunded_at IS NULL\n      );\n    END;",
              """      AND NOT EXISTS (
        SELECT 1
        FROM star_monitor_grants g
        WHERE g.user_id = star_monitor_entitlements.user_id
          AND g.refunded_at IS NULL
      );

      DELETE FROM monitors
      WHERE telegram_id = (
        SELECT user_id FROM star_monitor_grants WHERE bundle_id = NEW.bundle_id
      )
      AND NOT EXISTS (
        SELECT 1 FROM star_monitor_entitlements e
        WHERE e.user_id = monitors.telegram_id
          AND e.expires_at > CAST(strftime('%s','now') AS INTEGER)
      );
    END;""",
          )

          # Clear broad group command scopes written by the earlier implementation,
          # then repopulate member-scoped menus.
          one(
              'src/services/stars-command-surface.ts',
              "const COMMAND_SCOPE_MIGRATION_KEY = 'stars_command_scope_v3';",
              "const COMMAND_SCOPE_MIGRATION_KEY = 'stars_command_scope_v4';",
          )
          one(
              'src/services/stars-command-surface.ts',
              "  const users = db.prepare(\n    'SELECT telegram_id, language FROM users ORDER BY created_at ASC',\n  ).all() as { telegram_id: string; language?: string }[];",
              """  const legacyGroups = db.prepare(`
    SELECT DISTINCT group_id
    FROM (
      SELECT CAST(telegram_id AS TEXT) AS group_id
      FROM download_queue
      WHERE CAST(telegram_id AS INTEGER) < 0
      UNION
      SELECT CAST(json_extract(task_details, '$.chatId') AS TEXT) AS group_id
      FROM download_queue
      WHERE json_valid(task_details)
        AND CAST(json_extract(task_details, '$.chatId') AS INTEGER) < 0
    )
    WHERE group_id IS NOT NULL
    ORDER BY group_id
  `).all() as { group_id: string }[];

  for (const row of legacyGroups) {
    const groupId = Number(row.group_id);
    if (!Number.isFinite(groupId)) continue;
    try {
      await (bot.telegram as any).callApi('deleteMyCommands', {
