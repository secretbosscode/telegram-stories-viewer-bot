              '    jest.clearAllMocks();\n    downloadStories.mockResolvedValue',
              '    jest.clearAllMocks();\n    (bot.telegram.sendMediaGroup as jest.Mock).mockReset().mockResolvedValue([]);\n    downloadStories.mockResolvedValue',
          )
          append_test(
